name: scorecard

# OpenSSF Scorecard — supply-chain posture score (branch protection, pinned
# deps, token permissions, CI tests, vuln reporting, etc.). Publishes results to
# the OpenSSF API (enables the score badge) and uploads SARIF to code scanning.
on:
  branch_protection_rule:
  schedule:
    - cron: "27 6 * * 1" # weekly, Monday 06:27 UTC
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Job-level permissions REPLACE the workflow-level set (omitted scopes
      # become none), so contents: read must be explicit here — checkout and
      # Scorecard need it to read the repo.
      contents: read
      security-events: write # upload the SARIF result to code scanning
      id-token: write # OIDC to publish results to the OpenSSF API
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload the result as a build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.31.6
        with:
          sarif_file: results.sarif

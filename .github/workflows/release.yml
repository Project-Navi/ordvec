# Unified, tag-triggered release pipeline for ordvec (Rust crates + Python wheels).
#
# Cutting a stable `vMAJOR.MINOR.PATCH` tag fully automates: build (crates +
# wheels + sdist) -> canonicalize the Python dist (current build for new
# versions, verified PyPI-served bytes if PyPI already owns the immutable
# version) -> attest / SLSA-provenance the files this run actually built ->
# stage core/Python assets on the DRAFT GitHub Release (`release-assets-draft`)
# -> publish the core crate -> build/attest/stage the lockstep manifest crate
# plus `ordvec-manifest` Python assets (now that the core version exists on
# crates.io) -> gated registry publishes / verification -> un-draft ONLY after
# all registry jobs succeed
# (`publish-github-release`). The registry gates (two crates.io jobs plus two
# PyPI jobs) are bound to GitHub Environments with Required Reviewers, so they
# pause for a human.
#
# The un-draft-after-publish ordering is deliberate: it prevents a public
# GitHub Release from existing for a version that crates.io / PyPI later
# refused. If a publish fails, the Release stays DRAFT and the maintainer
# investigates / re-runs the failed job, after which `publish-github-release`
# un-drafts.
#
# `publish-crate` and `publish-manifest-crate` prove BYTE-IDENTITY between the
# .crate served by crates.io and the SLSA-attested artifact on BOTH sides of
# `cargo publish`:
#   * pre-publish: downloads the package's dist artifact, re-packages with
#     `--locked`, sha256-compares — fail-closed BEFORE the OIDC token is minted
#     (defends against toolchain drift / deterministic-packaging regression).
#   * post-publish: downloads the just-published .crate from crates.io and
#     sha256-compares to the attested artifact — empirical proof that the bytes
#     crates.io actually serves equal the SLSA-attested bytes (`cargo publish`
#     runs its own internal packaging step the pre-publish gate cannot inspect).
#     A mismatch fails closed: `publish-github-release` never un-drafts the
#     GitHub Release, and the failure is loudly audit-logged even though the
#     version is then yank-only.
#
# Why one workflow (not the old three): the GitHub Release assets + the single
# un-draft must be coordinated by explicit `needs:` edges. The previous
# `changelog.yml` / `release-crate.yml` / `release-python.yml` triggered
# independently and could not coordinate the asset attach — which is why v0.2.0
# was assembled by hand and the attestations were dropped. This file replaces
# all three.
#
# Provenance / attestation, soup to nuts (all genuine, nothing faked):
#   * SLSA generator -> `*.intoto.jsonl` on the Release  (OpenSSF Scorecard
#     Signed-Releases provenance probe; older unsigned releases may keep that
#     score below 10 temporarily; SLSA Build L3). Recovery mode limits SLSA
#     subjects to the Rust crate assets built by this run, because PyPI files are
#     immutable bytes from an earlier Trusted Publishing upload.
#   * actions/attest-build-provenance -> GitHub attestation store + a
#     `*.sigstore.json` bundle on the Release (`gh attestation verify`; also the
#     Scorecard signing probe sees this asset as a backup if the .intoto.jsonl
#     ever regresses). Recovery mode limits GitHub artifact attestations the
#     same way.
#   * gh-action-pypi-publish -> PEP 740 attestations on PyPI (Integrity API) on
#     fresh publishes; recovery mode skips upload and verifies the existing
#     PyPI-served hashes instead of minting attestations for different rebuilt
#     bytes.
#   * PyPI JSON hash check -> every served wheel/sdist digest matches the
#     canonical Python dist files staged on the GitHub Release.
#   * crates.io / PyPI publish/verification via Trusted Publishing gates (OIDC
#     only when uploading) — NO stored tokens.
#
# Fail-closed: `release-assets-draft`, `release-manifest-assets-draft`, and
# registry publishes `needs:` attest + provenance for their respective asset
# sets, so nothing is published unless the artifact source is verified; and
# `publish-github-release` `needs:` every registry gate, so the Release stays
# DRAFT unless all pass.
# `release-avx512` reruns the Intel SDE CPUID probe and AVX-512 tests inside
# this tag workflow and is a hard dependency of core asset staging. Routine
# CI may tolerate Intel mirror outages, but a release cannot publish on skipped
# AVX-512 coverage.
# The signed-release graph is pinned in
# `tests/release_signed_release_invariants.sh` (run by ci.yml's release-guard
# on every push/PR) so a future commit can't silently dismantle it.
#
# ONE-TIME SETUP before the first tag on this workflow (each fails CLOSED until
# done, so landing this first is safe):
#   * crates.io: ordvec and ordvec-manifest > Settings > Trusted Publishing >
#       edit each GitHub publisher -> owner = `Project-Navi`, repository =
#       `ordvec`, workflow = `release.yml` (env stays `crates-io`).
#   * PyPI: ordvec > publishing > edit the GitHub publisher -> owner =
#       `Project-Navi`, repository = `ordvec`, workflow = `release.yml`
#       (env stays `pypi`).
#   * PyPI: ordvec-manifest > publishing > add or edit the GitHub publisher
#       -> owner = `Project-Navi`, repository = `ordvec`, workflow =
#       `release.yml` (env stays `pypi`).
#   * GitHub Environments `crates-io` AND `pypi`:
#       - keep Required reviewers `Fieldnote-Echo` and `toadkicker`, enable
#         prevent self-review, and set the wait timer to 30 minutes;
#       - set "Deployment branches and tags" to **Selected branches and tags**
#         with a single TAG pattern: `v[0-9]*.[0-9]*.[0-9]*`. The old
#         workflow_dispatch setting (branch = `main` only) would now deadlock
#         publishing — this workflow runs on `refs/tags/...`, never on
#         `refs/heads/main`. The "tag must come from main" guarantee is preserved
#         by `require-ci-green` (which queries successful push runs on `main`
#         for the SHA), plus branch protection on `main`. See RELEASING.md.
#
# Tag glob is deliberately loose (`v[0-9]*...`); the `guard` job enforces strict
# SemVer (no leading zeros, no pre-release/build suffix). The tag name is only
# ever used as the quoted env "$TAG_NAME" / "$VERSION", never interpolated into a
# run: script (injection-safe).
name: release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

# Globally serialize releases (one release pipeline at a time across all tags)
# and NEVER cancel an in-flight publish. The group is a constant, not
# `release-${{ github.ref }}`, because per-tag scoping would allow two tag
# pipelines to run concurrently — which would race the Release-asset writes
# and double-book the gated registry pushes.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  guard:
    name: gate on a stable SemVer tag
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.semver.outputs.ok }}
      version: ${{ steps.semver.outputs.version }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Enforce strict SemVer
        id: semver
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # Each segment is 0 or [1-9][0-9]* (no leading zeros); no suffix.
          semver='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'
          if [[ "$TAG_NAME" =~ $semver ]]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::$TAG_NAME is not a stable vMAJOR.MINOR.PATCH tag; skipping release."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

  require-ci-green:
    # A tagged release must not ship a commit whose gates have not gone green.
    # The build jobs below rebuild + retest, but do NOT cover the core crate's
    # lint / no-default / experimental / MSRV 1.89 / deps + cargo-deny gates
    # (ci.yml), the binding's full OS/Python matrix (python.yml), the loader /
    # FastScan fuzz smoke (fuzz.yml), the CodeQL scan (codeql.yml), and the
    # workflow syntax/security lint gates (actionlint.yml, zizmor.yml). Require
    # each to have concluded `success` for this exact SHA on main.
    #
    # Only per-push-to-main workflows are gated, so a run for the release SHA is
    # guaranteed to exist: audit.yml is schedule-only; coverage*/scorecard are
    # advisory/external-flaky.
    name: require full CI green for this commit
    needs: guard
    if: needs.guard.outputs.ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      actions: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: assert release-gated workflows are green for this commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          POLL_INTERVAL_SECONDS: 30
          POLL_TIMEOUT_SECONDS: 1800
        run: |
          set -euo pipefail
          deadline=$((SECONDS + POLL_TIMEOUT_SECONDS))
          while :; do
            MAIN_SHA="$(gh api "repos/${REPO}/commits/main" --jq '.sha')"
            echo "current main sha: ${MAIN_SHA}"
            if [ "$SHA" != "$MAIN_SHA" ]; then
              echo "::error::release tag points at ${SHA}, but current main is ${MAIN_SHA}. Move the tag to the current protected main HEAD and re-run."
              exit 1
            fi

            all_green=true
            for wf in ci.yml python.yml fuzz.yml codeql.yml actionlint.yml zizmor.yml; do
              # Query every status, then inspect the latest exact-SHA push run.
              # A success-only filter cannot distinguish normal run-visibility
              # delay from terminal failure and was the source of issue #272.
              api_error="$(mktemp)"
              if ! runs_json="$(gh api \
                "repos/${REPO}/actions/workflows/${wf}/runs?head_sha=${SHA}&branch=main&event=push&per_page=100" \
                2>"$api_error")"; then
                echo "waiting for ${wf}: API query failed: $(<"$api_error")"
                rm -f "$api_error"
                all_green=false
                continue
              fi
              rm -f "$api_error"

              latest="$(jq -r --arg sha "$SHA" '
                [.workflow_runs[]
                  | select(.head_sha == $sha and .head_branch == "main" and .event == "push")]
                | sort_by([.run_number, .run_attempt, .id])
                | last
                | if . == null then ""
                  else [.status, (.conclusion // ""), (.html_url // "")] | join("|")
                  end
              ' <<<"$runs_json")"
              if [ -z "$latest" ]; then
                echo "waiting for ${wf}: no exact-SHA main push run is visible yet"
                all_green=false
                continue
              fi

              IFS='|' read -r status conclusion run_url <<<"$latest"
              if [ "$status" != "completed" ]; then
                echo "waiting for ${wf}: latest run is ${status} (${run_url})"
                all_green=false
              elif [ "$conclusion" = "success" ]; then
                echo "green ${wf}: ${run_url}"
              else
                echo "::error::${wf} completed with ${conclusion:-no conclusion} for ${SHA}: ${run_url}"
                exit 1
              fi
            done

            if "$all_green"; then
              FINAL_MAIN_SHA="$(gh api "repos/${REPO}/commits/main" --jq '.sha')"
              echo "final current main sha: ${FINAL_MAIN_SHA}"
              if [ "$SHA" != "$FINAL_MAIN_SHA" ]; then
                echo "::error::main advanced from release tag ${SHA} to ${FINAL_MAIN_SHA} while CI was being checked. Tag only the new protected main HEAD after its own CI is green."
                exit 1
              fi
              echo "all release-gated workflows are green for ${SHA} on main"
              break
            fi
            if (( SECONDS >= deadline )); then
              echo "::error::timed out after ${POLL_TIMEOUT_SECONDS}s waiting for exact-SHA main push CI. No artifacts or draft release were created."
              exit 1
            fi
            echo "CI is not settled; polling again in ${POLL_INTERVAL_SECONDS}s"
            sleep "$POLL_INTERVAL_SECONDS"
          done

  release-avx512:
    name: prove AVX-512 coverage under Intel SDE
    needs: [guard, require-ci-green]
    if: needs.guard.outputs.ok == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      SDE_VERSION: sde-external-10.8.0-2026-03-15-lin
      SDE_SHA256: 50b320cd226acef7a491f5b321fc1be3c3c7984f9e27a456e64894b5b0979dd3
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
      - name: Install Intel SDE
        id: sde
        uses: ./.github/actions/setup-intel-sde
        with:
          version: ${{ env.SDE_VERSION }}
          url-base: https://github.com/nihui/ncnn-assets/releases/download/toolchain
          sha256: ${{ env.SDE_SHA256 }}
          allow-unavailable: "false"
      - name: Sanity-check AVX-512 detection under SDE
        env:
          SDE_PATH: ${{ steps.sde.outputs.sde-path }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/sde-probe/src"
          cat > "${RUNNER_TEMP}/sde-probe/Cargo.toml" <<'EOF'
          [package]
          name = "sde-probe"
          version = "0.0.0"
          edition = "2021"
          [[bin]]
          name = "sde-probe"
          path = "src/main.rs"
          EOF
          cat > "${RUNNER_TEMP}/sde-probe/src/main.rs" <<'EOF'
          fn main() {
              let f = is_x86_feature_detected!("avx512f");
              let p = is_x86_feature_detected!("avx512vpopcntdq");
              println!("avx512f={f} avx512vpopcntdq={p}");
              assert!(f, "SDE did not expose avx512f to the guest");
              assert!(p, "SDE did not expose avx512vpopcntdq to the guest");
          }
          EOF
          cargo build --release --manifest-path "${RUNNER_TEMP}/sde-probe/Cargo.toml"
          "${SDE_PATH}" -spr -- \
            "${RUNNER_TEMP}/sde-probe/target/release/sde-probe"
      - name: cargo test under SDE (AVX-512 kernels)
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER: ${{ steps.sde.outputs.sde-path }} -spr --
          ORDVEC_REQUIRE_AVX512: "1"
        run: |
          set -euo pipefail
          cargo test
          cargo test --features experimental
          cargo test --features bench-utils

  notes:
    name: release notes (git-cliff) + draft Release
    needs: [guard, require-ci-green]
    if: needs.guard.outputs.ok == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the draft GitHub Release
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history + tags for git-cliff
          persist-credentials: false
      - name: Generate release notes
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
      - name: Create the draft GitHub Release
        # Draft so notes + the auto-attached artifacts/provenance get assembled
        # by `release-assets-draft`, the publishes then run gated, and
        # `publish-github-release` un-drafts ONLY after all publishes succeed.
        # `--verify-tag` ties it to this tag.
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --draft \
            --verify-tag \
            --title "$TAG_NAME" \
            --notes-file RELEASE_NOTES.md

  build-crate:
    name: build .crate + SBOM
    needs: [guard, require-ci-green]
    if: needs.guard.outputs.ok == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
      - name: Package the crate
        # Emits the SLSA-attested .crate artifact. `publish-crate` later
        # compares both a local repackage and the crates.io-served artifact to
        # this file.
        run: cargo package -p ordvec --locked
      - name: Generate CycloneDX SBOM for the crate
        run: |
          cargo install cargo-cyclonedx --version 0.5.9 --locked
          cargo cyclonedx --manifest-path Cargo.toml --format json
      - name: Upload the .crate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-crate
          path: target/package/*.crate
          if-no-files-found: error
      - name: Upload the crate SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-crate
          path: ordvec.cdx.json
          if-no-files-found: error

  build-manifest-crate:
    name: build ordvec-manifest .crate + SBOM
    needs: [guard, publish-crate]
    if: needs.guard.outputs.ok == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.guard.outputs.version }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
      - name: Package the manifest crate
        # The lockstep manifest crate depends on the just-tagged `ordvec`
        # version, so package it only after `publish-crate` has published and
        # verified the core crate. This is the first point where Cargo can
        # resolve the dependency through the registry for a fresh release.
        run: |
          set -euo pipefail
          for i in {1..12}; do
            if cargo package -p ordvec-manifest --locked; then
              exit 0
            fi
            if [ "$i" -eq 12 ]; then
              echo "::error::ordvec-manifest packaging did not resolve ordvec ${VERSION} after retries."
              exit 1
            fi
            echo "waiting for crates.io to resolve ordvec ${VERSION} before manifest packaging (${i}/12)..."
            sleep 10
          done
      - name: Generate CycloneDX SBOM for the manifest crate
        run: |
          cargo install cargo-cyclonedx --version 0.5.9 --locked
          cargo cyclonedx --manifest-path ordvec-manifest/Cargo.toml --format json
      - name: Upload the manifest .crate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-manifest-crate
          path: target/package/ordvec-manifest-*.crate
          if-no-files-found: error
      - name: Upload the manifest crate SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-manifest-crate
          path: ordvec-manifest/ordvec-manifest.cdx.json
          if-no-files-found: error

  build-wheels:
    name: wheel ${{ matrix.platform.target }} (${{ matrix.platform.runner }})
    needs: [guard, require-ci-green]
    if: needs.guard.outputs.ok == 'true'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest,  target: x86_64,  manylinux: auto }
          - { runner: ubuntu-latest,  target: aarch64, manylinux: auto }
          # No macOS x86_64 (Intel) leg — macos-13 hosted runners don't schedule
          # for this repo. Intel-mac users install from the sdist (issue #29).
          - { runner: macos-latest,   target: aarch64, manylinux: auto }
          - { runner: windows-latest, target: x64,     manylinux: auto }
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build abi3 wheel (covers CPython 3.10+)
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          working-directory: ordvec-python
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: --release --out dist
          # sccache deliberately OFF for release builds. A poisoned sccache entry
          # could inject code into the shipped wheel (zizmor cache-poisoning,
          # HIGH); the speedup isn't worth that risk on the release path. The CI
          # path (`python.yml`) keeps sccache on for the PR/main cadence.
      # Prove each native wheel runs before it can be published. The
      # linux/aarch64 wheel is cross-built here and smoke-tested on a native
      # ubuntu-24.04-arm runner by `smoke-linux-aarch64-wheel` below.
      - name: Set up Python to test the built wheel
        if: ${{ !(matrix.platform.runner == 'ubuntu-latest' && matrix.platform.target == 'aarch64') }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install the built wheel and run pytest
        if: ${{ !(matrix.platform.runner == 'ubuntu-latest' && matrix.platform.target == 'aarch64') }}
        shell: bash
        run: |
          set -euo pipefail
          WHEEL="$(python - <<'PY'
          from pathlib import Path
          wheels = sorted(Path("ordvec-python/dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected exactly one wheel, found {wheels}")
          print(wheels[0])
          PY
          )"
          python -m pip install --require-hashes -r ordvec-python/requirements-dev.txt
          REQ_FILE="${RUNNER_TEMP:?RUNNER_TEMP must be set}/ordvec-wheel-requirements.txt"
          python - <<'PY' "$WHEEL" > "$REQ_FILE"
          import hashlib
          import sys
          from pathlib import Path

          wheel = Path(sys.argv[1]).resolve()
          digest = hashlib.sha256(wheel.read_bytes()).hexdigest()
          print(f"ordvec @ {wheel.as_uri()} --hash=sha256:{digest}")
          PY
          python -m pip install --require-hashes --no-index --no-deps -r "$REQ_FILE"
          python -m pytest ordvec-python/tests -q
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: ordvec-python/dist/*.whl
          if-no-files-found: error

  smoke-linux-aarch64-wheel:
    name: smoke linux/aarch64 wheel
    needs: [guard, pypi-canonical-dist]
    if: needs.guard.outputs.ok == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Set up Python to test the canonical wheel
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download the canonical Python dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pypi-canonical-dist
          path: wheelhouse
      - name: Install exact wheel and run tiny RankQuant/Bitmap smoke
        shell: bash
        run: |
          set -euo pipefail
          WHEEL="$(python - <<'PY'
          from pathlib import Path
          wheels = sorted(
              wheel
              for wheel in Path("wheelhouse").glob("*.whl")
              if "aarch64" in wheel.name and ("manylinux" in wheel.name or "musllinux" in wheel.name)
          )
          if len(wheels) != 1:
              raise SystemExit(f"expected exactly one linux/aarch64 wheel, found {wheels}")
          print(wheels[0])
          PY
          )"
          python -m pip install --require-hashes -r ordvec-python/requirements-dev.txt
          REQ_FILE="${RUNNER_TEMP:?RUNNER_TEMP must be set}/ordvec-aarch64-wheel-requirements.txt"
          python - <<'PY' "$WHEEL" > "$REQ_FILE"
          import hashlib
          import sys
          from pathlib import Path

          wheel = Path(sys.argv[1]).resolve()
          digest = hashlib.sha256(wheel.read_bytes()).hexdigest()
          print(f"ordvec @ {wheel.as_uri()} --hash=sha256:{digest}")
          PY
          python -m pip install --require-hashes --no-index --no-deps -r "$REQ_FILE"
          python - <<'PY'
          import numpy as np
          from ordvec import Bitmap, RankQuant

          docs8 = np.arange(32, dtype=np.float32).reshape(4, 8)
          rq = RankQuant(8, 2)
          rq.add(docs8)
          scores, ids = rq.search_asymmetric(docs8[:1], 2)
          assert scores.shape == (1, 2)
          assert ids.shape == (1, 2)

          docs64 = np.arange(256, dtype=np.float32).reshape(4, 64)
          bm = Bitmap(64, 16)
          bm.add(docs64)
          scores, ids = bm.search(docs64[:1], 2)
          assert scores.shape == (1, 2)
          assert ids.shape == (1, 2)
          PY

  build-sdist:
    name: build sdist + SBOM
    needs: [guard, require-ci-green]
    if: needs.guard.outputs.ok == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build the sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          working-directory: ordvec-python
          command: sdist
          args: --out dist
      # Prove the sdist installs *from source* (compiles the Rust extension via
      # the maturin PEP 517 backend — a path the prebuilt wheels never exercise).
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
      - name: Set up Python to test the sdist
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install from the sdist and run pytest
        shell: bash
        run: |
          set -euo pipefail
          SDIST="$(python - <<'PY'
          from pathlib import Path
          sdists = sorted(Path("ordvec-python/dist").glob("*.tar.gz"))
          if len(sdists) != 1:
              raise SystemExit(f"expected exactly one sdist, found {sdists}")
          print(sdists[0])
          PY
          )"
          python -m pip install --require-hashes -r ordvec-python/requirements-dev.txt
          REQ_FILE="${RUNNER_TEMP:?RUNNER_TEMP must be set}/ordvec-sdist-requirements.txt"
          python - <<'PY' "$SDIST" > "$REQ_FILE"
          import hashlib
          import sys
          from pathlib import Path

          sdist = Path(sys.argv[1]).resolve()
          digest = hashlib.sha256(sdist.read_bytes()).hexdigest()
          print(f"ordvec @ {sdist.as_uri()} --hash=sha256:{digest}")
          PY
          python -m pip install --require-hashes --no-index --no-deps --no-build-isolation -r "$REQ_FILE"
          python -m pytest ordvec-python/tests -q
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: ordvec-python/dist/*.tar.gz
          if-no-files-found: error
      # Binding-crate SBOM — generated once (the wheel is the compiled Rust
      # extension, so the binding crate's dependency tree is the meaningful BOM).
      - name: Install cargo-cyclonedx
        shell: bash
        run: cargo install cargo-cyclonedx --version 0.5.9 --locked
      - name: Generate CycloneDX SBOM for the binding crate
        shell: bash
        run: cargo cyclonedx --manifest-path ordvec-python/Cargo.toml --format json
      - name: Upload the binding SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-python
          path: ordvec-python/ordvec-python.cdx.json
          if-no-files-found: error


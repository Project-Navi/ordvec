            --built-dir built-dist \
            --out-dir canonical-dist \
            --expected-wheels 4 \
            --expected-sdists 1 \
            --required-wheel-tag x86_64 \
            --required-wheel-tag aarch64 \
            --required-wheel-tag macosx \
            --required-wheel-tag win_amd64

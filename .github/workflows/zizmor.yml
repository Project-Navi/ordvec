name: zizmor

# Static security audit of the GitHub Actions workflows themselves — action
# pinning, token permissions, template injection, credential persistence. This
# locks in the supply-chain hardening: a future PR that adds an unpinned action,
# a broad GITHUB_TOKEN, or a credential-persisting checkout fails here. Run
# offline + version-pinned so the gate is deterministic.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zizmor:
    name: zizmor (workflow security audit)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install zizmor (pinned)
        run: pip install --require-hashes -r .github/zizmor-requirements.txt
      - name: Audit workflows
        run: zizmor --offline --persona=regular .github/workflows/

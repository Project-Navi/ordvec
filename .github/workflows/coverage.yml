name: coverage

# Measure test coverage with cargo-llvm-cov (enforcing a regression floor in the
# same --all-features run) and upload to Codecov for the README badge. The upload
# is informational — fail_ci_if_error is false, so a failed or absent upload never
# blocks a PR. Activate the repo at https://codecov.io to surface the dashboard +
# badge.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: coverage (cargo-llvm-cov + Intel SDE)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write # authenticate Codecov upload to the current repo via OIDC
    env:
      SDE_VERSION: sde-external-10.8.0-2026-03-15-lin
      SDE_SHA256: 50b320cd226acef7a491f5b321fc1be3c3c7984f9e27a456e64894b5b0979dd3
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Restore Intel SDE archive cache
        # The setup action still verifies SHA-256 before extraction. The cache
        # only reduces exposure to Intel downloadmirror outages.
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ordvec-intel-sde
          key: intel-sde-${{ runner.os }}-${{ runner.arch }}-${{ env.SDE_VERSION }}-${{ env.SDE_SHA256 }}
          restore-keys: |
            intel-sde-${{ runner.os }}-${{ runner.arch }}-
      - name: Install Intel SDE
        id: sde
        uses: ./.github/actions/setup-intel-sde
        with:
          version: ${{ env.SDE_VERSION }}
          sha256: ${{ env.SDE_SHA256 }}
          allow-unavailable: ${{ github.event_name != 'workflow_dispatch' }}
      - name: note Intel SDE unavailable
        if: ${{ steps.sde.outputs.sde-available != 'true' }}
        run: |
          echo "::warning::Intel SDE archive unavailable; SDE-backed coverage skipped. The release workflow has a separate fail-closed AVX-512 proof."
      - name: Install cargo-llvm-cov (pinned)
        if: ${{ steps.sde.outputs.sde-available == 'true' }}
        run: cargo install cargo-llvm-cov --version 0.8.7 --locked
      - name: Sanity-check AVX-512 detection under SDE
        if: ${{ steps.sde.outputs.sde-available == 'true' }}
        env:
          SDE_PATH: ${{ steps.sde.outputs.sde-path }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/sde-probe/src"
          cat > "${RUNNER_TEMP}/sde-probe/Cargo.toml" <<'EOF'
          [package]
          name = "sde-probe"
          version = "0.0.0"
          edition = "2021"
          [[bin]]
          name = "sde-probe"
          path = "src/main.rs"
          EOF
          cat > "${RUNNER_TEMP}/sde-probe/src/main.rs" <<'EOF'
          fn main() {
              let f = is_x86_feature_detected!("avx512f");
              let p = is_x86_feature_detected!("avx512vpopcntdq");
              println!("avx512f={f} avx512vpopcntdq={p}");
              assert!(f, "SDE did not expose avx512f to the guest");
              assert!(p, "SDE did not expose avx512vpopcntdq to the guest");
          }
          EOF
          cargo build --release --manifest-path "${RUNNER_TEMP}/sde-probe/Cargo.toml"
          "${SDE_PATH}" -spr -- \
            "${RUNNER_TEMP}/sde-probe/target/release/sde-probe"
      # Generate the lcov report AND enforce a regression floor in a single
      # --all-features invocation, so the floor is computed on exactly the data
      # that gets uploaded (no separate `report` step that could differ in
      # selection). On a regression this command exits non-zero, so the upload
      # below is skipped.
      #
      # Run the instrumented test binaries through Intel SDE (-spr) so runtime
      # feature detection reaches the AVX-512 kernels. That makes the coverage
      # floor reflect the same exercised code as the dedicated ci.yml avx512 job.
      - name: Generate coverage (lcov) + enforce floor
        if: ${{ steps.sde.outputs.sde-available == 'true' }}
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER: ${{ steps.sde.outputs.sde-path }} -spr --
        run: cargo llvm-cov --all-features --target x86_64-unknown-linux-gnu --fail-under-lines 85 --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        if: ${{ steps.sde.outputs.sde-available == 'true' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: lcov.info
          fail_ci_if_error: false
          use_oidc: true

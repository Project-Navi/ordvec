name: audit

# Scheduled supply-chain advisory scan. ci.yml's `deny` job already runs
# cargo-deny on every push/PR, but a NEW RUSTSEC advisory filed against an
# existing, unchanged dependency would not be caught until the next PR opens.
# This re-runs the advisories check on a weekly schedule (and on demand) so a
# freshly published advisory surfaces as a failing run rather than going unseen
# between PRs — standard hygiene for a crate published to crates.io + PyPI.
#
# Read-only token, no `run:` steps (no injection surface). Because this runs
# UNATTENDED on a cron schedule, the third-party actions are SHA-pinned (not the
# mutable @v4/@v2 tags ci.yml uses on human-triggered push/PR) so a compromised
# tag update cannot auto-execute on a scheduled runner. Scoped to `check
# advisories`, with separate locked roots for the main workspace and the
# standalone fuzz crate so neither committed lockfile can fall outside the
# advisory graph.

on:
  schedule:
    - cron: "17 6 * * 1" # 06:17 UTC every Monday
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  advisories:
    name: cargo-deny advisories
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Audit root workspace advisories
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check
          arguments: --workspace --all-features --locked
          command-arguments: advisories
      - name: Audit standalone fuzz lockfile advisories
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check
          arguments: --manifest-path fuzz/Cargo.toml --all-features --locked
          command-arguments: advisories

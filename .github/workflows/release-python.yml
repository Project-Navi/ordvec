# Publishes the `ordvec` Python bindings (distributed as the `ordvec` wheel) to
# PyPI via Trusted Publishing (OIDC). abi3-py39 => one wheel per platform covers
# CPython 3.9+, so the matrix varies by platform/arch only.
#
# maturin runs with working-directory: ordvec-python (matching python.yml) so the
# binding's own pyproject.toml/Cargo.toml are the unambiguous build context.
#
# PUBLISH-HELD by design:
#   * workflow_dispatch only.
#   * the publish job is bound to the `pypi` GitHub Environment; add a Required
#     reviewer there for a human approval gate (enforced once the repo is public,
#     or now on a paid plan).
#
# Trusted publisher (already configured on PyPI):
#   project=ordvec  owner=Fieldnote-Echo  repo=ordvec  workflow=release-python.yml  env=pypi
name: release-python

on:
  workflow_dispatch:

# Serialize releases; never cancel an in-flight publish.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-wheels:
    name: wheel ${{ matrix.platform.target }} (${{ matrix.platform.runner }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest,  target: x86_64,  manylinux: auto }
          - { runner: ubuntu-latest,  target: aarch64, manylinux: auto }
          - { runner: macos-13,       target: x86_64,  manylinux: auto }
          - { runner: macos-latest,   target: aarch64, manylinux: auto }
          - { runner: windows-latest, target: x64,     manylinux: auto }
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build abi3 wheel (covers CPython 3.9+)
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          working-directory: ordvec-python
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: --release --out dist
          sccache: 'true'
      # T2 — prove the freshly-built wheel actually runs before it is uploaded
      # for publish: set up Python, install the wheel, run the pytest suite.
      # The linux/aarch64 wheel is cross-built here under QEMU and can't execute
      # on the x86 host, so it is skipped — its runtime is covered by python.yml's
      # native ubuntu-24.04-arm leg and by this job's macOS-arm64 leg.
      - name: Set up Python to test the built wheel
        if: ${{ !(matrix.platform.runner == 'ubuntu-latest' && matrix.platform.target == 'aarch64') }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install the built wheel and run pytest
        if: ${{ !(matrix.platform.runner == 'ubuntu-latest' && matrix.platform.target == 'aarch64') }}
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip pytest numpy
          python -m pip install ordvec-python/dist/*.whl
          python -m pytest ordvec-python/tests -q
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: ordvec-python/dist

  build-sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build the sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          working-directory: ordvec-python
          command: sdist
          args: --out dist
      # T2 — prove the sdist installs *from source* and passes the suite before
      # it is uploaded for publish. `pip install <sdist>` compiles the Rust
      # extension from the vendored core crate via the maturin PEP 517 backend —
      # a packaging path the prebuilt wheels never exercise (a missing path-dep
      # vendor or workspace mis-resolution would fail here, not in users'
      # installs). The runner's preinstalled Rust toolchain builds it.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
      - name: Set up Python to test the sdist
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install from the sdist and run pytest
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip pytest numpy
          python -m pip install ordvec-python/dist/*.tar.gz
          python -m pytest ordvec-python/tests -q
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: ordvec-python/dist
      # CycloneDX SBOM — generated ONCE here, not per-wheel. The wheel is the
      # compiled Rust extension, so the binding crate's Cargo dependency tree is
      # the meaningful, platform-independent bill of materials. cargo-cyclonedx
      # walks the manifest and writes `<crate>.cdx.json` next to it, i.e.
      # `ordvec-python/ordvec-python.cdx.json`. The dtolnay toolchain above
      # provides cargo.
      - name: Install cargo-cyclonedx
        shell: bash
        run: cargo install cargo-cyclonedx --locked
      - name: Generate CycloneDX SBOM for the binding crate
        shell: bash
        run: cargo cyclonedx --manifest-path ordvec-python/Cargo.toml --format json
      - name: Upload the SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-python
          path: ordvec-python/ordvec-python.cdx.json

  require-ci-green:
    # The wheel must not ship from a commit whose core (`ci.yml`) or binding
    # (`python.yml`) matrices have not gone green. The build-wheels job above
    # builds + pytest-checks each platform wheel, but it does not cover the core
    # crate's gates or the binding's full OS/Python matrix and lint. Require
    # both workflows to have concluded `success` for this exact SHA.
    name: require core + binding CI green for this commit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: assert ci.yml and python.yml are green for this commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Require a SUCCESSFUL run for this SHA *on main* for each workflow.
          # Filtering on the branch as well as head_sha stops a green run for the
          # same commit on an unrelated branch from satisfying the gate.
          for wf in ci.yml python.yml; do
            ok="$(gh api \
              "repos/${REPO}/actions/workflows/${wf}/runs?head_sha=${SHA}&branch=main&per_page=20" \
              --jq '[.workflow_runs[] | select(.head_branch == "main" and .conclusion == "success")] | length')"
            echo "successful ${wf} runs for ${SHA} on main: ${ok}"
            if [ "${ok}" -lt 1 ]; then
              echo "::error::no successful ${wf} run for ${SHA} on main. Push to main, let CI pass, then re-run this release."
              exit 1
            fi
          done

  publish:
    name: publish to PyPI
    needs: [build-wheels, build-sdist, require-ci-green]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ordvec
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      # GitHub SLSA build provenance for the wheels + sdist, complementary to the
      # PyPI-side PEP 740 attestations the pypa publish step emits below. Attest
      # runs BEFORE publish so a failed attestation fails the release closed —
      # nothing is pushed to PyPI without provenance recorded first.
      - name: Attest build provenance for the wheels + sdist
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
      - name: Publish to PyPI (Trusted Publishing; PEP 740 attestations on by default)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

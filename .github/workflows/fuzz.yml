name: fuzz

# Bounded cargo-fuzz smoke. The nine targets in fuzz/ are normally exercised
# in manual campaigns; this adds CI cadence so a regression that reintroduces a
# loader panic / OOM, breaks the write->load round-trip, or destabilises the
# FastScan or two-stage retrieval kernels surface in CI rather than only at
# the next manual run
# (THREAT-FUZZ-002 in THREAT_MODEL.md).
#
#   * pull_request / push(main): a SHORT smoke (60s/target) over the
#     highest-value targets — fast enough to run on every change.
#   * schedule (weekly) / workflow_dispatch: a LONGER sweep (300s/target)
#     across ALL nine targets.
#
# This runs UNATTENDED on a cron schedule, so every third-party action is
# SHA-pinned, cargo-fuzz is installed with its bundled lockfile on a pinned
# Rust toolchain, and fuzzing runs on a pinned nightly — a fuzz smoke must not
# itself become a supply-chain hole. Read-only token; the only `run:`
# interpolation is the matrix target name, passed through `env:` (never inlined
# into the shell) so there is no template-injection surface (THREAT-CICD-001).

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * 4" # 05:00 UTC every Thursday (clear of audit/scorecard Mon + codeql Wed)
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_FUZZ_VERSION: "0.13.1"
  CARGO_FUZZ_INSTALL_TOOLCHAIN: "1.89.0"
  FUZZ_NIGHTLY: "nightly-2025-08-15"

concurrency:
  group: fuzz-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Short per-change smoke over the highest-value targets: two loaders, the
  # FastScan b=2 kernel, and the downstream-style SignBitmap -> RankQuant
  # composed retrieval path.
  smoke:
    name: fuzz smoke (60s)
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target: [load_rank, load_rankquant, fastscan_b2, signbitmap_rankquant_twostage]
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.89.0; cargo-fuzz locked install
        with:
          toolchain: ${{ env.CARGO_FUZZ_INSTALL_TOOLCHAIN }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly; channel via toolchain: below
        with:
          toolchain: ${{ env.FUZZ_NIGHTLY }}
      - name: Install cargo-fuzz (version-pinned)
        run: cargo "+${CARGO_FUZZ_INSTALL_TOOLCHAIN}" install cargo-fuzz --version "${CARGO_FUZZ_VERSION}" --locked
      - name: Check fuzz lockfile is current
        run: cargo metadata --manifest-path fuzz/Cargo.toml --locked --format-version 1 >/dev/null
      - name: Smoke
        env:
          TARGET: ${{ matrix.target }}
        run: cargo "+${FUZZ_NIGHTLY}" fuzz run "$TARGET" -- -max_total_time=60 -rss_limit_mb=4096

  # Weekly full sweep over all nine targets at a larger time budget.
  weekly:
    name: fuzz weekly (300s)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        target:
          - load_rank
          - load_rankquant
          - load_bitmap
          - load_sign_bitmap
          - load_fastscan
          - roundtrip_rankquant
          - search_rankquant
          - fastscan_b2
          - signbitmap_rankquant_twostage
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.89.0; cargo-fuzz locked install
        with:
          toolchain: ${{ env.CARGO_FUZZ_INSTALL_TOOLCHAIN }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly; channel via toolchain: below
        with:
          toolchain: ${{ env.FUZZ_NIGHTLY }}
      - name: Install cargo-fuzz (version-pinned)
        run: cargo "+${CARGO_FUZZ_INSTALL_TOOLCHAIN}" install cargo-fuzz --version "${CARGO_FUZZ_VERSION}" --locked
      - name: Check fuzz lockfile is current
        run: cargo metadata --manifest-path fuzz/Cargo.toml --locked --format-version 1 >/dev/null
      - name: Fuzz
        env:
          TARGET: ${{ matrix.target }}
        run: cargo "+${FUZZ_NIGHTLY}" fuzz run "$TARGET" -- -max_total_time=300 -rss_limit_mb=4096

name: changelog

# Cut a GitHub Release with git-cliff-generated notes when a stable
# vMAJOR.MINOR.PATCH tag is pushed. This job does NOT write to `main` — `main`
# is branch-protected (no direct pushes, signed commits, required reviews), so
# the in-repo CHANGELOG.md is curated via the release PR (see CONTRIBUTING.md
# "Releases"). git-cliff authors only the public GitHub Release notes here.
#
# The Release is created as a DRAFT so the generated notes get a final human
# check before they go public (this repo holds a fiction-free, publishable-grade
# bar). Drop `--draft` below once you trust the output.
#
# Tag handling: GitHub Actions tag globs cannot express "digits only" (and `+`
# is unreliable there), so the trigger is a deliberately loose
# `v[0-9]*.[0-9]*.[0-9]*` and the gate step enforces strict SemVer — each of
# MAJOR/MINOR/PATCH is `0` or a non-zero-led integer (no leading zeros), with no
# suffix. A pre-release (v0.3.0-rc.1), leading-zero (v01.2.3), or otherwise
# non-SemVer (v1.2.3.4, vfoo.bar.baz) tag therefore wakes the job but skips
# every step below the gate — no checkout, no git-cliff, no Release.
#
# Injection-safety: the only external value used in a run: step is the tag name,
# bound to the `TAG_NAME` env var from `github.ref_name` and used as the quoted
# "$TAG_NAME" (never interpolated into the run: script), so a crafted tag name
# cannot break out of the command.

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

concurrency:
  group: changelog-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the GitHub Release

jobs:
  release-notes:
    name: release notes (git-cliff)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Gate on a stable SemVer tag
        id: semver
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # Strict SemVer core: each segment is 0 or [1-9][0-9]* (no leading
          # zeros), and there is no pre-release / build suffix.
          semver='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'
          if [[ "$TAG_NAME" =~ $semver ]]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::$TAG_NAME is not a stable vMAJOR.MINOR.PATCH tag; skipping release notes."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi
      # actions/checkout v6.0.2, SHA-pinned — a contents:write job pins ALL
      # tooling to immutable refs (no mutable tags), git-cliff-action included.
      - if: steps.semver.outputs.ok == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # full history + tags for git-cliff
          persist-credentials: false
      - name: Generate release notes
        if: steps.semver.outputs.ok == 'true'
        # orhun/git-cliff-action v4.8.0, SHA-pinned (supply-chain hygiene for a
        # workflow holding a contents:write token).
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
      - name: Create draft GitHub Release
        if: steps.semver.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --draft \
            --verify-tag \
            --title "$TAG_NAME" \
            --notes-file RELEASE_NOTES.md

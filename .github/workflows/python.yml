name: python

# Bindings CI: lint + build the ordvec-python extension with maturin and run the
# pytest suite across OS and Python versions. Kept separate from ci.yml (the
# core-crate gates) so the binding's pyo3/numpy/ndarray toolchain never entangles
# the core checks, and so a green run proves the bindings build cold from a
# checkout (the paper's reproducibility requirement).
on:
  # Push runs on EVERY commit to main (no paths filter): release-python.yml's
  # require-ci-green gate asserts a successful python.yml run exists for the exact
  # release SHA on main, so a docs-only or workflow-only release tip must still
  # produce a run here or the wheel gate would be unsatisfiable. Feature branches
  # stay path-filtered via the pull_request trigger below (a PR that doesn't touch
  # the binding skips this), and main's concurrency cancels superseded runs.
  push:
    branches: [main]
  pull_request:
    paths:
      - "ordvec-python/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/python.yml"

concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: clippy + fmt (binding)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # The core ci.yml clippy is scoped to the core crate via default-members,
      # so the binding gets its quality gate here instead.
      - run: cargo fmt -p ordvec-python --check
      - run: cargo clippy -p ordvec-python --all-targets -- -D warnings

  test:
    name: py${{ matrix.python }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # release-python.yml builds one wheel per platform; this matrix makes
        # sure every one of those targets is *behaviourally* tested (build →
        # install → pytest), not merely compiled. abi3 means a single wheel
        # covers all CPython 3.10+, so the python axis only needs its 3.10↔3.13
        # floor/ceiling checked once (linux/x86_64); the other targets exercise
        # the native code on 3.13. The aarch64 runners (ubuntu-24.04-arm,
        # macos-latest) are what exercise the NEON kernels through the bindings.
        # NB: ubuntu-24.04-arm hosted runners are free on public repos / paid
        # plans; until this repo is public the ARM leg may queue or bill.
        # macOS-Intel (macos-13) is intentionally NOT tested here: that runner
        # image is deprecated + scarce, so the jobs sit queued and block PRs. The
        # Intel wheel is still built + shipped by release-python.yml, and its
        # x86_64 code is covered by the linux-x86_64 legs (logic) + macos-arm64
        # (Mach-O), so the lost test coverage is marginal.
        include:
          - { os: ubuntu-latest, python: "3.10" } # linux x86_64 — abi3 floor
          - { os: ubuntu-latest, python: "3.13" } # linux x86_64 — abi3 ceiling
          - { os: ubuntu-24.04-arm, python: "3.13" } # linux aarch64 — NEON
          - { os: macos-latest, python: "3.13" } # macOS arm64 — NEON
          - { os: windows-latest, python: "3.13" } # windows x64
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: install build + test deps
        run: python -m pip install --require-hashes -r ordvec-python/requirements-dev.txt
      - name: build the wheel (abi3, release)
        working-directory: ordvec-python
        run: maturin build --release --out dist
      - name: install the built wheel
        shell: bash
        run: python -m pip install ordvec-python/dist/*.whl
      - name: pytest
        run: python -m pytest ordvec-python/tests -q

# Publishes the `ordvec` core crate to crates.io via Trusted Publishing (OIDC).
#
# PUBLISH-HELD by design:
#   * workflow_dispatch only — nothing ships unless a maintainer runs it.
#   * the publish job is bound to the `crates-io` GitHub Environment; add a
#     Required reviewer there for a human approval gate (enforced once the repo
#     is public, or now on a paid plan).
#   * build + test + `cargo publish --dry-run` run first; publish only on success.
#
# Rust toolchain via dtolnay/rust-toolchain, SHA-pinned to the stable branch
# (immutable action code; supply-chain hygiene for the publish pipeline —
# `with: toolchain: stable` selects the compiler). MSRV 1.89 stays gated by
# ci.yml's `msrv` job.
#
# One-time setup before the first OIDC publish:
#   * crates.io: ordvec > Settings > Trusted Publishing > Add a GitHub publisher
#       owner=Fieldnote-Echo  repo=ordvec  workflow=release-crate.yml  env=crates-io
#   * GitHub: Settings > Environments > create `crates-io`.
name: release-crate

on:
  workflow_dispatch:

# Serialize releases; never cancel an in-flight publish.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: build + test + publish dry-run
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
      - name: Test the core crate
        run: cargo test -p ordvec --locked
      - name: Dry-run the publish (packaging + metadata + verify build)
        run: cargo publish -p ordvec --locked --dry-run

  require-ci-green:
    # A manual release dispatch must not ship a commit whose full CI matrix has
    # not gone green. The `verify` job above re-runs tests + the publish
    # dry-run, but it does NOT cover lint, the no-default/experimental configs,
    # MSRV 1.89, the deps + cargo-deny supply-chain gates, or the AVX-512-SDE /
    # wasm-simd128 runtime coverage. Rather than duplicate (and drift from) all
    # of ci.yml, require that the `ci` workflow concluded `success` for this
    # exact SHA before publish runs.
    name: require full CI green for this commit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: assert ci.yml is green for this commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Require a SUCCESSFUL ci.yml run for this SHA *on main*. Filtering on
          # the branch as well as head_sha stops a green run for the same commit
          # on an unrelated branch from satisfying the gate.
          ok="$(gh api \
            "repos/${REPO}/actions/workflows/ci.yml/runs?head_sha=${SHA}&branch=main&per_page=20" \
            --jq '[.workflow_runs[] | select(.head_branch == "main" and .conclusion == "success")] | length')"
          echo "successful ci.yml runs for ${SHA} on main: ${ok}"
          if [ "${ok}" -lt 1 ]; then
            echo "::error::no successful ci.yml run for ${SHA} on main. Push to main, let CI pass, then re-run this release."
            exit 1
          fi

  publish:
    name: publish to crates.io
    needs: [verify, require-ci-green]
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write
      # Required by actions/attest-build-provenance to write the SLSA
      # provenance attestation for the published .crate.
      attestations: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
      # Supply-chain attestation + SBOM, run BEFORE the publish so a failed
      # attestation fails the release closed (the .crate is never pushed if we
      # can't attest it). crates.io does not host SBOMs, so the CycloneDX SBOM
      # is uploaded as a build artifact rather than shipped with the crate; the
      # attestation below is GitHub-issued SLSA build provenance bound to the
      # exact published .crate.
      - name: Package the crate (produces the artifact to attest)
        # Emits target/package/ordvec-<version>.crate — the precise byte-for-byte
        # tarball that `cargo publish` uploads, so the provenance covers the
        # published artifact.
        run: cargo package -p ordvec --locked
      - name: Generate CycloneDX SBOM for the crate
        # cargo-cyclonedx writes ordvec.cdx.json (named <package>.cdx.json) at the
        # repo root for the core crate. Verified locally: the command rejects
        # `-p`; package scoping is via --manifest-path against the root manifest,
        # which is the `ordvec` package.
        run: |
          cargo install cargo-cyclonedx --version 0.5.9 --locked
          cargo cyclonedx --manifest-path Cargo.toml --format json
      - name: Attest build provenance for the .crate
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: target/package/*.crate
      - name: Upload SBOM as a build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-crate
          path: ordvec.cdx.json
          if-no-files-found: error
      # Mint the crates.io OIDC credential LAST — only here, immediately before
      # publish, so the short-lived token is never live during the
      # `cargo install cargo-cyclonedx` step (third-party code) or the
      # attestation/upload steps. Minimises the token's exposure window.
      - name: Mint a short-lived crates.io credential (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
      - name: cargo publish
        run: cargo publish -p ordvec --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

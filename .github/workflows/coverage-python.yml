name: coverage-python

# Coverage of the PyO3 binding's *Rust* layer (ordvec-python/src/lib.rs) as
# exercised by the pytest suite — the half the core coverage.yml job (scoped
# -p ordvec) cannot see. cargo-llvm-cov instruments the cdylib via a
# RUSTC_WRAPPER (show-env); maturin builds that instrumented extension into a
# venv; pytest drives it (each test process emits .profraw); and
# "report -p ordvec-python" aggregates them. Uploaded to Codecov under the
# python-binding flag so the binding's number is tracked apart from the core
# line. Informational like the core coverage job: no floor yet (the FFI glue
# has guard branches unreachable on 64-bit, e.g. the usize-overflow arms), and
# fail_ci_if_error is false so a failed or absent upload never blocks a PR.
# The upload uses OIDC so Codecov authenticates the current GitHub repository
# identity after transfers instead of depending on a repo-token slug.
on:
  push:
    branches: [main]
    paths:
      - "ordvec-python/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/coverage-python.yml"
  pull_request:
    paths:
      - "ordvec-python/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/coverage-python.yml"
  workflow_dispatch:

concurrency:
  group: coverage-python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage-python:
    name: coverage (binding, cargo-llvm-cov + pytest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # authenticate Codecov upload to the current repo via OIDC
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-llvm-cov (pinned)
        run: cargo install cargo-llvm-cov --version 0.8.7 --locked
      # One shell: the cargo-llvm-cov env from show-env must stay live across the
      # instrumented maturin build, the pytest run, and the report, so they share
      # a single step. shell: bash is pinned explicitly (the step uses bash), and
      # show-env is written to a file first so that a failure aborts the step
      # under `set -e` instead of letting pytest/report run uninstrumented and
      # upload misleading coverage. The venv isolates maturin's editable install.
      - name: Build instrumented extension, run pytest, collect coverage
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --require-hashes -r ordvec-python/requirements-dev.txt
          cargo llvm-cov show-env --sh > "$RUNNER_TEMP/llvm-cov-env.sh"
          source "$RUNNER_TEMP/llvm-cov-env.sh"
          cargo llvm-cov clean --workspace
          ( cd ordvec-python && maturin develop )
          python -m pytest ordvec-python/tests -q
          cargo llvm-cov report -p ordvec-python --summary-only
          cargo llvm-cov report -p ordvec-python --lcov --output-path binding-lcov.info
      - name: Upload binding coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: binding-lcov.info
          flags: python-binding
          fail_ci_if_error: false
          use_oidc: true

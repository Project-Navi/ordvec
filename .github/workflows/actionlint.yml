name: actionlint

# Lint the GitHub Actions workflows: YAML/expression correctness, action input
# validity, and shellcheck over every run: block. Complements zizmor (security)
# with correctness. actionlint is version-pinned and installed via the runner's
# preinstalled Go toolchain (no extra third-party action to trust).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint (workflow lint)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install + run actionlint (pinned)
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          "$(go env GOPATH)/bin/actionlint" -color

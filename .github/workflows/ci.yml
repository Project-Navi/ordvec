# ordvec — release gate CI.
#
# ordvec is a pure-Rust SIMD vector-retrieval crate (no BLAS / faer / ndarray).
# Its AVX-512 / AVX2 kernels are dispatched at runtime via
# `is_x86_feature_detected!`, with a scalar fallback. GitHub-hosted runners do
# not expose AVX-512, so the `test` matrix only exercises the scalar/AVX2
# paths; the `avx512` job runs the suite under Intel SDE (emulating Sapphire
# Rapids) so the AVX-512 kernels are actually covered. MSRV is 1.89 (the
# release where the AVX-512 intrinsics this crate uses were stabilized).
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Fail the build on any compiler warning across every job.
  RUSTFLAGS: -D warnings

defaults:
  run:
    # Git Bash ships on the Windows runner, so a single shell keeps the
    # multi-line `run:` blocks portable across the test matrix.
    shell: bash

jobs:
  # ----------------------------------------------------------------------
  # Formatting + clippy. Lints `--all-features` so the experimental scaffold
  # is held to the same bar as the stable surface.
  # ----------------------------------------------------------------------
  lint:
    name: lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      # Establish an egress baseline (audit-only: logs outbound traffic
      # without blocking it). A later PR can switch to block + allowlist.
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo fmt --check
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ----------------------------------------------------------------------
  # C ABI crate. The root workspace intentionally keeps `default-members =
  # ["."]`, so the FFI crate has an explicit CI lane for its Rust tests,
  # clippy, and generated-header drift check.
  # ----------------------------------------------------------------------
  ffi:
    name: ffi (tests + header drift)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: install cbindgen
        env:
          RUSTFLAGS: ""
        run: cargo install cbindgen --version 0.29.3 --locked
      - name: cbindgen --verify
        run: cbindgen ordvec-ffi --config ordvec-ffi/cbindgen.toml --output ordvec-ffi/include/ordvec.h --verify
      - name: cargo build -p ordvec-ffi
        run: cargo build -p ordvec-ffi
      - name: cargo test -p ordvec-ffi
        run: cargo test -p ordvec-ffi
      - name: cargo clippy -p ordvec-ffi
        run: cargo clippy -p ordvec-ffi --all-targets -- -D warnings

  # ----------------------------------------------------------------------
  # Manifest verifier crate. Kept out of default-members so the core crate's
  # default no-system-deps contract stays unchanged; this explicit lane covers
  # its no-default-features surface, optional SQLite support, and clippy.
  # ----------------------------------------------------------------------
  manifest:
    name: manifest verifier
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo test -p ordvec-manifest --no-default-features
        run: cargo test -p ordvec-manifest --no-default-features
      - name: cargo test -p ordvec-manifest --all-features
        run: cargo test -p ordvec-manifest --all-features
      - name: cargo clippy -p ordvec-manifest
        run: cargo clippy -p ordvec-manifest --all-targets --all-features -- -D warnings

  # ----------------------------------------------------------------------
  # Repo-local Go wrapper over the C ABI. Build the release static library
  # first because the cgo wrapper links the source-tree archive directly.
  # ----------------------------------------------------------------------
  go-wrapper:
    name: go wrapper (cgo)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo build -p ordvec-ffi --release
        run: cargo build -p ordvec-ffi --release
      - name: go test
        working-directory: ordvec-go
        env:
          GOCACHE: ${{ runner.temp }}/go-build
        run: go test -count=1 ./...
      - name: go test -race
        working-directory: ordvec-go
        env:
          GOCACHE: ${{ runner.temp }}/go-build
        run: go test -race -count=1 ./...
      - name: go test (cgocheck2)
        working-directory: ordvec-go
        env:
          GOEXPERIMENT: cgocheck2
          GOCACHE: ${{ runner.temp }}/go-build-cgocheck2
        run: go test -count=1 ./...

  # ----------------------------------------------------------------------
  # Test matrix across the three GitHub-hosted OSes. Covers the default
  # surface, the experimental feature, the no-default-features build, and a
  # release build of the bench example (the heaviest compile path).
  # ----------------------------------------------------------------------
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo test (default features)
        run: cargo test
      - name: cargo test (experimental)
        run: cargo test --features experimental
      - name: cargo test (test-utils)
        run: cargo test --features test-utils
      - name: cargo test (no default features)
        run: cargo test --no-default-features
      - name: cargo build --release --example bench_rank
        run: cargo build --release --example bench_rank

  # ----------------------------------------------------------------------
  # Prove the declared MSRV (1.89.0) actually builds and tests. There is
  # intentionally NO rust-toolchain.toml in the repo: dtolnay/rust-toolchain
  # neither removes nor overrides one, so a committed toolchain file would take
  # rustup directory-override precedence and silently change this floor. The
  # MSRV is therefore pinned here, in the workflow, as the source of truth.
  # ----------------------------------------------------------------------
  msrv:
    name: msrv (1.89.0)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # MSRV pin; channel via toolchain: below
        with:
          toolchain: 1.89.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo build
        run: cargo build
      - name: cargo test
        run: cargo test

  # ----------------------------------------------------------------------
  # No-system-deps guarantee + packaging check. Fails if any forbidden
  # numerical/BLAS crate has crept into the dependency tree, then checks the
  # publishable crate artifacts before a real release. A fresh lockstep
  # ordvec-manifest version cannot be packaged until the matching ordvec core
  # version exists on crates.io, so CI records that exact dependency-resolution
  # case as deferred; release.yml performs the real manifest package check
  # after publish-crate succeeds.
  # ----------------------------------------------------------------------
  deps:
    name: deps (no-system-deps + publish dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: assert no BLAS/faer/ndarray/statrs in the tree
        run: |
          set -euo pipefail
          # Inspect the CORE crate's graph (scoped with -p ordvec), including the
          # experimental feature and dev-dependencies, so nothing slips in behind a
          # flag. Scoping matters since the workspace gained the ordvec-python member:
          # rust-numpy legitimately pulls in `ndarray` for the PyPI binding, which must
          # NOT count against the core crate's zero-system-deps guarantee.
          tree="$(cargo tree -p ordvec --all-features --edges normal,build,dev)"
          echo "$tree"
          # Boundaries exclude only alphanumerics, so hyphen/underscore variants
          # (blas-src, openblas-src, ndarray-linalg, faer-core, blas_sys) are
          # caught, while substrings (e.g. "myblaster") are not.
          if echo "$tree" | grep -Eiq '(^|[^[:alnum:]])(blas|openblas|faer|ndarray|statrs)([^[:alnum:]]|$)'; then
            echo "::error::forbidden system/numerical dependency found in the tree (blas|openblas|faer|ndarray|statrs)"
            exit 1
          fi
          echo "OK: no forbidden dependencies"
      - name: cargo publish --dry-run
        # Explicit -p ordvec: in a workspace, publish should never infer the package
        # from the current directory. The Python binding remains publish = false
        # and ships to PyPI via maturin.
        run: cargo publish -p ordvec --dry-run --locked
      - name: cargo package -p ordvec-manifest when lockstep core exists
        run: |
          set -euo pipefail
          core_version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json, sys; print(next(pkg["version"] for pkg in json.load(sys.stdin)["packages"] if pkg["name"] == "ordvec"))')"
          log="${RUNNER_TEMP}/ordvec-manifest-package.log"
          if cargo package -p ordvec-manifest --locked 2>&1 | tee "$log"; then
            exit 0
          fi
          status="$(curl \
            --silent \
            --show-error \
            --location \
            --connect-timeout 10 \
            --max-time 60 \
            --retry 3 \
            --retry-all-errors \
            --user-agent "ordvec-ci/${core_version} (https://github.com/Project-Navi/ordvec)" \
            --output /dev/null \
            --write-out "%{http_code}" \
            "https://crates.io/api/v1/crates/ordvec/${core_version}" || true)"
          if [ "${status}" = "404" ]; then
            echo "::notice::ordvec-manifest package check is deferred: the lockstep ordvec version is not published yet. release.yml packages ordvec-manifest after publish-crate succeeds."
            exit 0
          fi
          echo "::error::ordvec-manifest package failed and ordvec ${core_version} registry status was ${status}; not deferring a real packaging failure."
          exit 1

  # ----------------------------------------------------------------------
  # Pin the release-publish invariants. release.yml is tag-triggered (with the
  # registry publishes gated behind GitHub Environments), so its release-
  # specific flow runs only on a real release. Two structural lints guard it
  # on every push/PR so regressions can't sneak in between releases:
  #   * release_publish_invariants.sh — the *.cdx.json SBOM never reaches PyPI
  #     (a generated SBOM once broke both publish paths).
  #   * release_signed_release_invariants.sh — the signed-release / provenance
  #     graph stays intact: release-assets-draft stays draft, the SLSA
  #     generator emits a .intoto.jsonl, registry publishes need the draft
  #     assets, Rust crates prove byte-identity vs their attested .crate files,
  #     and publish-github-release un-drafts ONLY after all registry publishes
  #     succeed.
  # ----------------------------------------------------------------------
  release-guard:
    name: release-publish invariants
    runs-on: ubuntu-latest
    # Least-privilege: the guard only runs git check-ignore + grep on the
    # checked-out tree, so a read-only token is all it needs (explicit here even
    # though the workflow default is already contents: read).
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: release-publish SBOM invariants
        run: bash tests/release_publish_invariants.sh
      - name: signed-release / provenance invariants
        run: bash tests/release_signed_release_invariants.sh

  # ----------------------------------------------------------------------
  # Supply-chain policy gate. The `deps` job's cargo-tree grep is a coarse
  # "no BLAS/ndarray/faer" guard; this job enforces the fine-grained, auditable
  # policy in deny.toml — RUSTSEC advisories, the license allow-list, banned /
  # wildcard / duplicate crates, and the crates.io-only source allow-list —
  # over the whole workspace graph (the binding's pyo3/numpy/ndarray deps
  # included). Fails the build on a new advisory or a non-allow-listed license.
  # ----------------------------------------------------------------------
  deny:
    name: cargo-deny (advisories + licenses + bans + sources)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check

  # ----------------------------------------------------------------------
  # AVX-512 coverage via Intel SDE. GitHub-hosted runners lack AVX-512, so we
  # run the compiled test binaries under SDE emulating Sapphire Rapids (-spr:
  # AVX-512 F/BW/VL/DQ + VPOPCNTDQ). Setting CARGO_TARGET_..._RUNNER makes
  # `cargo test` launch each test executable through the SDE wrapper, so the
  # crate's runtime is_x86_feature_detected! dispatch lights up the AVX-512
  # kernels instead of the scalar/AVX2 fallback.
  #
  # Pattern adapted from microsoft/DiskANN's CI (also a vector-search crate).
  # The local setup-intel-sde action owns the fixed Intel downloadmirror build,
  # SHA256 verification, and x86_64 runner guard. The SHA gate fails closed for
  # any archive we extract. Pull requests may soft-skip during Intel mirror
  # outages, but push/workflow_dispatch runs fail closed; the release gate only
  # accepts the post-merge push workflow result, so a release cannot proceed
  # without the SDE probe and AVX-512 tests actually executing on main.
  avx512:
    name: avx512 (Intel SDE / Sapphire Rapids)
    runs-on: ubuntu-24.04
    env:
      SDE_VERSION: sde-external-10.8.0-2026-03-15-lin
      SDE_SHA256: 50b320cd226acef7a491f5b321fc1be3c3c7984f9e27a456e64894b5b0979dd3
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Restore Intel SDE archive cache
        # The setup action still verifies SHA-256 before extraction. The cache
        # only reduces release-gate exposure to Intel downloadmirror outages.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ordvec-intel-sde
          key: intel-sde-${{ runner.os }}-${{ runner.arch }}-${{ env.SDE_VERSION }}-${{ env.SDE_SHA256 }}
          restore-keys: |
            intel-sde-${{ runner.os }}-${{ runner.arch }}-
      - name: install Intel SDE
        id: sde
        uses: ./.github/actions/setup-intel-sde
        with:
          version: ${{ env.SDE_VERSION }}
          sha256: ${{ env.SDE_SHA256 }}
          allow-unavailable: ${{ github.event_name == 'pull_request' }}
      - name: note Intel SDE unavailable on PR
        if: ${{ github.event_name == 'pull_request' && steps.sde.outputs.sde-available != 'true' }}
        run: |
          echo "::warning::Intel SDE archive unavailable on this pull request; push and release-gated runs fail closed."
      - name: sanity-check AVX-512 detection under SDE
        if: ${{ steps.sde.outputs.sde-available == 'true' }}
        env:
          SDE_PATH: ${{ steps.sde.outputs.sde-path }}
        run: |
          set -euo pipefail
          # Prove SDE genuinely exposes AVX-512 to the guest via the SAME
          # mechanism the crate dispatches on: is_x86_feature_detected! reads
          # CPUID, which SDE intercepts (a /proc/cpuinfo grep would only see
          # the host and be misleading). If this prints `false` the kernels
          # would never be reached and the coverage below would be a no-op,
          # so fail the job hard in that case.
          mkdir -p "${RUNNER_TEMP}/sde-probe/src"
          cat > "${RUNNER_TEMP}/sde-probe/Cargo.toml" <<'EOF'
          [package]
          name = "sde-probe"
          version = "0.0.0"
          edition = "2021"
          [[bin]]
          name = "sde-probe"
          path = "src/main.rs"
          EOF
          cat > "${RUNNER_TEMP}/sde-probe/src/main.rs" <<'EOF'
          fn main() {
              let f = is_x86_feature_detected!("avx512f");
              let p = is_x86_feature_detected!("avx512vpopcntdq");
              println!("avx512f={f} avx512vpopcntdq={p}");
              assert!(f, "SDE did not expose avx512f to the guest");
              assert!(p, "SDE did not expose avx512vpopcntdq to the guest");
          }
          EOF
          cargo build --release --manifest-path "${RUNNER_TEMP}/sde-probe/Cargo.toml"
          "${SDE_PATH}" -spr -- \
            "${RUNNER_TEMP}/sde-probe/target/release/sde-probe"
      - name: cargo test under SDE (AVX-512 kernels)
        if: ${{ steps.sde.outputs.sde-available == 'true' }}
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER: ${{ steps.sde.outputs.sde-path }} -spr --
          # Cause any AVX-512 test that would silently skip on a non-AVX-512 host
          # to panic loudly here, so this job genuinely enforces the kernels.
          ORDVEC_REQUIRE_AVX512: "1"
        run: |
          set -euo pipefail
          cargo test
          cargo test --features experimental

  # ----------------------------------------------------------------------
  # WASM: the bitmap/sign popcount kernels have a `simd128` path
  # (cfg(all(target_arch = "wasm32", target_feature = "simd128"))). Hosted
  # runners can't execute wasm32-unknown-unknown directly, so we (a)
  # compile-gate the browser/edge target with simd128 enabled, and (b) run
  # the popcount equivalence test under wasmtime via wasm32-wasip1. rayon
  # falls back to a single-threaded pool on wasm, so the search paths reach
  # the same simd128 kernel. This is the runtime correctness gate for the
  # simd128 path — the wasm analogue of the `avx512`-under-SDE job.
  wasm:
    name: wasm32 (simd128)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
          components: clippy
          targets: wasm32-unknown-unknown, wasm32-wasip1, aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: install wasmtime (executes the wasip1 test binary)
        # Pinned release + sha256 verification, instead of `curl | bash` of an
        # unpinned install script (Scorecard Pinned-Dependencies / supply chain).
        # Arch-derived so the job survives a switch to an ARM Ubuntu runner.
        env:
          WASMTIME_VERSION: v45.0.0
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64)  arch=x86_64;  sha256=9d92e6dc04630f617e0e5d532327a5a917ac4898587e07f4fb7a5fc7fffef760 ;;
            aarch64) arch=aarch64; sha256=4a27083ba8d3c64526b2d469f50e6539cb4c1dd9d08336e0d8953bca616737e3 ;;
            *) echo "::error::unsupported runner architecture: $(uname -m)"; exit 1 ;;
          esac
          tarball="wasmtime-${WASMTIME_VERSION}-${arch}-linux.tar.xz"
          curl -sSfLO "https://github.com/bytecodealliance/wasmtime/releases/download/${WASMTIME_VERSION}/${tarball}"
          echo "${sha256}  ${tarball}" | sha256sum -c -
          tar xJf "${tarball}"
          echo "${PWD}/wasmtime-${WASMTIME_VERSION}-${arch}-linux" >> "${GITHUB_PATH}"
      # `--no-deps` keeps clippy scoped to this crate; Cargo still compiles
      # dependencies with its usual `--cap-lints allow`, so third-party
      # target-only warnings cannot mask warnings in ordvec's cfg-gated code.
      - name: clippy wasm32-unknown-unknown + simd128 (-D warnings)
        env:
          RUSTFLAGS: -D warnings -C target-feature=+simd128
        run: cargo clippy -p ordvec --lib --target wasm32-unknown-unknown --no-deps -- -D warnings
      - name: clippy aarch64 NEON (-D warnings)
        env:
          RUSTFLAGS: -D warnings
        run: cargo clippy -p ordvec --lib --target aarch64-unknown-linux-gnu --no-deps -- -D warnings
      - name: build wasm32-unknown-unknown + simd128 (browser / edge target)
        env:
          RUSTFLAGS: -D warnings -C target-feature=+simd128
        run: cargo build --lib --target wasm32-unknown-unknown
      - name: run the simd128 popcount kernel test under wasmtime
        env:
          RUSTFLAGS: -D warnings -C target-feature=+simd128
          CARGO_TARGET_WASM32_WASIP1_RUNNER: wasmtime
        run: |
          set -euo pipefail
          log="${RUNNER_TEMP}/wasm-popcount-test.log"
          cargo test --lib --target wasm32-wasip1 util::tests::popcount_helpers_match_naive -- --exact 2>&1 | tee "$log"
          grep -Eq 'test result: ok\. 1 passed;' "$log"

  # ----------------------------------------------------------------------
  # Benchmark visibility (not a pass/fail perf gate). Runs the self-contained
  # seeded synthetic bench on x86_64 (AVX) and Linux/aarch64 (NEON) so the
  # per-architecture SIMD numbers land in the CI log — bench_rank prints the
  # detected arch + SIMD features. Apples-to-apples (same OS, different
  # arch+SIMD) for the paper's cross-platform distribution story. The job
  # fails only if the bench itself errors. (ubuntu-24.04-arm hosted runners
  # are free on public repos / paid plans; the ARM leg may queue or bill
  # while the repo is private.)
  bench:
    name: bench_rank (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-03-27)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: run bench_rank (scaled, seeded synthetic corpus)
        run: cargo run --release --example bench_rank -- --n 10000 --queries 100

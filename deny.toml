# cargo-deny configuration for ordvec.
#
# Run locally with:  cargo deny check
# Schema validated against cargo-deny 0.19.x.
#
# ordvec ships no system/numerical dependencies (no BLAS, faer, ndarray,
# statrs). The CI `deps` job greps `cargo tree` for those names as a coarse
# guard; this file is the fine-grained license + advisory + duplicate gate.

[graph]
# Check every target. ordvec is x86_64-first (AVX-512/AVX2 kernels) but the
# scalar fallback is portable, so we don't restrict the target set here.
all-features = true

[advisories]
# Default behaviour: error on any RUSTSEC advisory (vulnerability) or
# unmaintained crate in the tree. No advisories are currently ignored; add
# entries with an explicit `reason` only when triaged.
ignore = []

[licenses]
# Allow-list only. cargo-deny denies any license not listed here.
#
# Derived from `cargo metadata` over the full graph (lib + dev + build):
#   * MIT / Apache-2.0      — ordvec itself + the bulk of the tree
#     (rayon, crossbeam-*, rand*, libc, …).
#   * Unicode-3.0           — required by unicode-ident, whose expression is
#     `(MIT OR Apache-2.0) AND Unicode-3.0`; the AND clause means Unicode-3.0
#     must be explicitly allowed even though MIT/Apache cover the other half.
#   * BSD-2-Clause          — zerocopy / zerocopy-derive are
#     `BSD-2-Clause OR Apache-2.0 OR MIT`; the OR resolves via Apache/MIT, but
#     allowing BSD-2-Clause keeps the choice explicit and audit-clear.
#   * Apache-2.0 WITH LLVM-exception — wasi's expression includes it; only
#     pulled on wasm targets, harmless to allow and keeps cross-target clean.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "BSD-2-Clause",
]
# License text must match an SPDX template at >= this confidence to count.
confidence-threshold = 0.8
# Several allow entries (Unicode-3.0, BSD-2-Clause, Apache-2.0 WITH
# LLVM-exception) only surface on non-host targets or behind OR-expressions
# that resolve to MIT/Apache on the default target — see the notes above.
# They are genuinely present in the full `--target all` graph, so keep them
# allowed but don't warn when a given target doesn't exercise them.
unused-allowed-license = "allow"

[licenses.private]
# ordvec is published to crates.io; nothing to ignore here.
ignore = false

[bans]
# Warn (don't fail) on duplicate versions: a transitive diamond shouldn't
# block a release, but it should be visible so it can be flattened over time.
multiple-versions = "warn"
# Wildcard (`*`) version requirements are sloppy for a published crate.
wildcards = "deny"
highlight = "all"
# No crate-level allow/deny overrides — the license + advisory gates carry the
# policy. (The forbidden numerical crates are caught by the CI `deps` grep and,
# transitively, by this license allow-list since they'd drag in new licenses.)
allow = []
deny = []
skip = []
skip-tree = []

[sources]
# Only crates.io is trusted. Any git or alternative-registry source must be
# added deliberately, so flag the unknown ones.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
